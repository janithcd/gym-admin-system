<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #111827, #1f2937);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: white;
            border-radius: 22px;
            padding: 34px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.28);
        }

        .login-title {
            font-weight: 800;
            color: #111827;
        }

        .login-subtitle {
            color: #6b7280;
            font-size: 14px;
        }

        .brand-circle {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            background: #111827;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 18px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="brand-circle">G</div>

    <h3 class="login-title mb-1">Admin Login</h3>
    <p class="login-subtitle mb-4">
        Sign in to manage members, payments, and gym access.
    </p>

    <div th:if="${param.error}" class="alert alert-danger">
        Invalid username or password.
    </div>

    <div th:if="${param.logout}" class="alert alert-success">
        You have logged out successfully.
    </div>

    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Enter username"
                   required
                   autofocus>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter password"
                   required>
        </div>

        <button type="submit" class="btn btn-dark w-100 action-btn">
            Login
        </button>

    </form>

    <p class="text-muted small mt-4 mb-0">
        Default: admin / admin123
    </p>

</div>

</body>
</html>
