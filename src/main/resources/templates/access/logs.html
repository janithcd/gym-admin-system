<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Access Logs')}"></head>

<body>

<div class="app-wrapper">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <main class="main-content">

        <div th:replace="~{fragments/layout :: topbar('Access Logs', 'Search and review gym entry attempts')}"></div>

        <!-- Search Filter Card -->
        <div class="content-card mb-4">

            <form th:action="@{/access/logs}" method="get" class="row g-3 align-items-end">

                <div class="col-md-4">
                    <label class="form-label">Search Access Log</label>
                    <input type="text"
                           name="keyword"
                           class="form-control"
                           placeholder="Member code, name, phone, entered code"
                           th:value="${selectedKeyword}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Access Status</label>
                    <select name="accessStatus" class="form-select">
                        <option value="">All Statuses</option>

                        <option th:each="status : ${accessStatuses}"
                                th:value="${status}"
                                th:text="${status}"
                                th:selected="${selectedAccessStatus == status.name()}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">Start Date</label>
                    <input type="date"
                           name="startDate"
                           class="form-control"
                           th:value="${selectedStartDate}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">End Date</label>
                    <input type="date"
                           name="endDate"
                           class="form-control"
                           th:value="${selectedEndDate}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Rows</label>
                    <select name="size" class="form-select">
                        <option value="5" th:selected="${pageSize == 5}">5</option>
                        <option value="10" th:selected="${pageSize == 10}">10</option>
                        <option value="20" th:selected="${pageSize == 20}">20</option>
                        <option value="50" th:selected="${pageSize == 50}">50</option>
                    </select>
                </div>

                <input type="hidden" name="page" value="0">

                <div class="col-md-12 d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-dark action-btn">
                        Search
                    </button>

                    <a href="/access/logs" class="btn btn-outline-secondary action-btn">
                        Clear Filters
                    </a>

                    <a href="/access/scan" class="btn btn-primary action-btn">
                        Go to Access Scan
                    </a>

                    <a href="/access/logs/cleanup"
                       class="btn btn-outline-danger action-btn"
                       data-swal-confirm="true"
                       data-swal-title="Cleanup old logs?"
                       data-swal-text="This will delete access logs older than 7 days."
                       data-swal-confirm-button="Yes, cleanup">
                        Cleanup Old Logs
                    </a>
                </div>

            </form>

        </div>

        <!-- Logs Table -->
        <div class="content-card">

            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

                <div>
                    <h5 class="mb-0">Access Log Records</h5>
                    <p class="text-muted mb-0">
                        Showing
                        <strong th:text="${logs.size()}">0</strong>
                        of
                        <strong th:text="${totalItems}">0</strong>
                        log(s)
                    </p>
                </div>

                <a href="/access/scan" class="btn btn-primary action-btn">
                    Access Scan
                </a>

            </div>

            <div class="table-responsive">
                <table class="table table-hover table-bordered">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Entered Code</th>
                        <th>Member</th>
                        <th>Access Status</th>
                        <th>Reason</th>
                        <th>Access Time</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="log : ${logs}">
                        <td th:text="${log.id}"></td>

                        <td>
                            <strong th:text="${log.enteredMemberCode}"></strong>
                        </td>

                        <td>
                            <div th:if="${log.member != null}">
                                <strong th:text="${log.member.memberCode}"></strong><br>
                                <span th:text="${log.member.fullName}"></span><br>
                                <small class="text-muted" th:text="${log.member.phone}"></small>
                            </div>

                            <div th:if="${log.member == null}">
                                <span class="text-muted">Unknown Member</span>
                            </div>
                        </td>

                        <td>
                            <span th:if="${log.accessStatus.name() == 'GRANTED'}"
                                  class="badge text-bg-success">
                                GRANTED
                            </span>

                            <span th:if="${log.accessStatus.name() == 'DENIED'}"
                                  class="badge text-bg-danger">
                                DENIED
                            </span>
                        </td>

                        <td th:text="${log.reason}"></td>
                        <td th:text="${log.accessTime}"></td>
                    </tr>

                    <tr th:if="${logs.isEmpty()}">
                        <td colspan="6" class="text-center text-muted">
                            No access logs found for the selected filters.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2">

                <div class="text-muted">
                    Page
                    <strong th:text="${currentPage + 1}">1</strong>
                    of
                    <strong th:text="${totalPages}">1</strong>
                </div>

                <nav>
                    <ul class="pagination mb-0">

                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/access/logs(
                                    page=${currentPage - 1},
                                    size=${pageSize},
                                    keyword=${selectedKeyword},
                                    accessStatus=${selectedAccessStatus},
                                    startDate=${selectedStartDate},
                                    endDate=${selectedEndDate}
                               )}">
                                Previous
                            </a>
                        </li>

                        <li class="page-item"
                            th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${pageNumber == currentPage} ? 'active'">

                            <a class="page-link"
                               th:text="${pageNumber + 1}"
                               th:href="@{/access/logs(
                                    page=${pageNumber},
                                    size=${pageSize},
                                    keyword=${selectedKeyword},
                                    accessStatus=${selectedAccessStatus},
                                    startDate=${selectedStartDate},
                                    endDate=${selectedEndDate}
                               )}">
                                1
                            </a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/access/logs(
                                    page=${currentPage + 1},
                                    size=${pageSize},
                                    keyword=${selectedKeyword},
                                    accessStatus=${selectedAccessStatus},
                                    startDate=${selectedStartDate},
                                    endDate=${selectedEndDate}
                               )}">
                                Next
                            </a>
                        </li>

                    </ul>
                </nav>

            </div>

        </div>

    </main>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
