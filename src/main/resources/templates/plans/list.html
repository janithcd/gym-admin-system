<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Membership Plans')}"></head>

<body>

<div class="app-wrapper">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <main class="main-content">

        <div th:replace="~{fragments/layout :: topbar('Membership Plans', 'Manage gym membership packages and pricing')}"></div>

        <div class="content-card">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Plan List</h5>
                <a href="/plans/new" class="btn btn-primary action-btn">Add New Plan</a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover table-bordered">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Plan Name</th>
                        <th>Duration Days</th>
                        <th>Price</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Updated</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="plan : ${plans}">
                        <td th:text="${plan.id}"></td>
                        <td th:text="${plan.planName}"></td>
                        <td th:text="${plan.durationDays}"></td>
                        <td>Rs. <span th:text="${plan.price}"></span></td>
                        <td th:text="${plan.description}"></td>

                        <td>
                            <span th:if="${plan.status.name() == 'ACTIVE'}"
                                  class="badge text-bg-success"
                                  th:text="${plan.status}">
                            </span>

                            <span th:if="${plan.status.name() == 'INACTIVE'}"
                                  class="badge text-bg-secondary"
                                  th:text="${plan.status}">
                            </span>
                        </td>

                        <td th:text="${plan.createdAt}"></td>
                        <td th:text="${plan.updatedAt}"></td>

                        <td>
                            <a th:href="@{/plans/edit/{id}(id=${plan.id})}"
                               class="btn btn-sm btn-outline-primary">
                                Edit
                            </a>

                            <a th:href="@{/plans/delete/{id}(id=${plan.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Are you sure you want to delete this plan?')">
                                Delete
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>

    </main>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
