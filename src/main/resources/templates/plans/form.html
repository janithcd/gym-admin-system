<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Membership Plan Form')}"></head>

<body>

<div class="app-wrapper">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <main class="main-content">

        <div th:replace="~{fragments/layout :: topbar('Membership Plan Form', 'Create or update gym membership plan details')}"></div>

        <div class="content-card">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="mb-0">Plan Details</h5>
                <a href="/plans" class="btn btn-outline-secondary action-btn">Back to Plans</a>
            </div>

            <form th:action="@{/plans/save}" th:object="${plan}" method="post">

                <input type="hidden" th:field="*{id}">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Plan Name</label>
                        <input type="text" class="form-control" th:field="*{planName}" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Duration Days</label>
                        <input type="number" class="form-control" th:field="*{durationDays}" required min="1">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Price</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{price}" required min="0">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Status</label>
                        <select class="form-select" th:field="*{status}">
                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:text="${status}">
                            </option>
                        </select>
                    </div>

                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary action-btn">Save Plan</button>
                    <a href="/plans" class="btn btn-outline-secondary action-btn">Cancel</a>
                </div>

            </form>

        </div>

    </main>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
