<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Members')}"></head>

<body>

<div class="app-wrapper">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <main class="main-content">

        <div th:replace="~{fragments/layout :: topbar('Members', 'Manage gym member details and access status')}"></div>

        <div class="content-card">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Member List</h5>
                <a href="/members/new" class="btn btn-primary action-btn">Add New Member</a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover table-bordered">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Code</th>
                        <th>Full Name</th>
                        <th>Phone</th>
                        <th>NIC</th>
                        <th>Gender</th>
                        <th>Age</th>
                        <th>Height</th>
                        <th>Weight</th>
                        <th>Status</th>
                        <th>Joined</th>
                        <th>Device ID</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="member : ${members}">
                        <td th:text="${member.id}"></td>
                        <td th:text="${member.memberCode}"></td>
                        <td th:text="${member.fullName}"></td>
                        <td th:text="${member.phone}"></td>
                        <td th:text="${member.nic}"></td>
                        <td th:text="${member.gender}"></td>
                        <td th:text="${member.age}"></td>
                        <td th:text="${member.heightCm}"></td>
                        <td th:text="${member.weightKg}"></td>

                        <td>
                            <span th:if="${member.status.name() == 'ACTIVE'}"
                                  class="badge text-bg-success"
                                  th:text="${member.status}">
                            </span>

                            <span th:if="${member.status.name() == 'EXPIRED'}"
                                  class="badge text-bg-danger"
                                  th:text="${member.status}">
                            </span>

                            <span th:if="${member.status.name() == 'SUSPENDED'}"
                                  class="badge text-bg-warning"
                                  th:text="${member.status}">
                            </span>
                        </td>

                        <td th:text="${member.joinedDate}"></td>
                        <td th:text="${member.deviceUserId}"></td>

                        <td>
                            <a th:href="@{/members/view/{id}(id=${member.id})}"
                               class="btn btn-sm btn-outline-dark">
                                View
                            </a>

                            <a th:href="@{/members/edit/{id}(id=${member.id})}"
                               class="btn btn-sm btn-outline-primary">
                                Edit
                            </a>

                            <a th:href="@{/members/delete/{id}(id=${member.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Are you sure you want to delete this member?')">
                                Delete
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>

    </main>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
