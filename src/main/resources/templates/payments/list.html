<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Payments')}"></head>

<body>

<div class="app-wrapper">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <main class="main-content">

        <div th:replace="~{fragments/layout :: topbar('Payments', 'Track member payments, renewals, and membership expiry')}"></div>

        <div class="content-card">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Payment Records</h5>
                <a href="/payments/new" class="btn btn-success action-btn">Add New Payment</a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover table-bordered">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Member</th>
                        <th>Plan</th>
                        <th>Amount</th>
                        <th>Method</th>
                        <th>Payment Date</th>
                        <th>Start</th>
                        <th>Expiry</th>
                        <th>Status</th>
                        <th>Note</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="payment : ${payments}">
                        <td th:text="${payment.id}"></td>

                        <td>
                            <strong th:text="${payment.member.memberCode}"></strong><br>
                            <span class="text-muted" th:text="${payment.member.fullName}"></span>
                        </td>

                        <td th:text="${payment.membershipPlan.planName}"></td>
                        <td>Rs. <span th:text="${payment.amount}"></span></td>
                        <td th:text="${payment.paymentMethod}"></td>
                        <td th:text="${payment.paymentDate}"></td>
                        <td th:text="${payment.startDate}"></td>
                        <td th:text="${payment.expiryDate}"></td>

                        <td>
                            <span th:if="${payment.status.name() == 'PAID'}"
                                  class="badge text-bg-success"
                                  th:text="${payment.status}">
                            </span>

                            <span th:if="${payment.status.name() == 'CANCELLED'}"
                                  class="badge text-bg-danger"
                                  th:text="${payment.status}">
                            </span>
                        </td>

                        <td th:text="${payment.note}"></td>

                        <td>
                            <a th:href="@{/payments/receipt/{id}(id=${payment.id})}"
                               class="btn btn-sm btn-outline-dark">
                                Receipt
                            </a>

                            <a th:href="@{/payments/cancel/{id}(id=${payment.id})}"
                               class="btn btn-sm btn-outline-warning"
                               onclick="return confirm('Are you sure you want to cancel this payment?')">
                                Cancel
                            </a>

                            <a th:href="@{/payments/delete/{id}(id=${payment.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Are you sure you want to delete this payment?')">
                                Delete
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>

    </main>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
