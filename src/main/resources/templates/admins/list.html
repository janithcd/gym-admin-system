<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Admin Users')}"></head>

<body>

<div class="app-wrapper">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <main class="main-content">

        <div th:replace="~{fragments/layout :: topbar('Admin Users', 'Manage system administrators and access permissions')}"></div>

        <div class="content-card">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Admin Account List</h5>
                <a href="/admins/new" class="btn btn-primary action-btn">Add New Admin</a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover table-bordered">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Full Name</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="admin : ${admins}">
                        <td th:text="${admin.id}"></td>
                        <td th:text="${admin.fullName}"></td>
                        <td th:text="${admin.username}"></td>
                        <td th:text="${admin.email}"></td>

                        <td>
                            <span th:if="${admin.role.name() == 'SUPER_ADMIN'}"
                                  class="badge text-bg-dark"
                                  th:text="${admin.role}">
                            </span>

                            <span th:if="${admin.role.name() == 'ADMIN'}"
                                  class="badge text-bg-primary"
                                  th:text="${admin.role}">
                            </span>
                        </td>

                        <td>
                            <span th:if="${admin.enabled}"
                                  class="badge text-bg-success">
                                ENABLED
                            </span>

                            <span th:if="${!admin.enabled}"
                                  class="badge text-bg-danger">
                                DISABLED
                            </span>
                        </td>

                        <td th:text="${admin.createdAt}"></td>

                        <td>
                            <a th:href="@{/admins/edit/{id}(id=${admin.id})}"
                               class="btn btn-sm btn-outline-primary">
                                Edit
                            </a>

                            <a th:href="@{/admins/delete/{id}(id=${admin.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Are you sure you want to delete this admin?')">
                                Delete
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>

    </main>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
