<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Change Password')}"></head>

<body>

<div class="app-wrapper">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <main class="main-content">

        <div th:replace="~{fragments/layout :: topbar('Change Password', 'Update your admin account password securely')}"></div>

        <div class="row justify-content-center">

            <div class="col-lg-6">

                <div class="content-card">

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="mb-0">Password Update</h5>

                        <a href="/profile" class="btn btn-outline-secondary action-btn">
                            Back to Profile
                        </a>
                    </div>

                    <form th:action="@{/profile/change-password}" th:object="${changePasswordDTO}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password"
                                   class="form-control"
                                   th:field="*{currentPassword}"
                                   placeholder="Enter current password"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password"
                                   class="form-control"
                                   th:field="*{newPassword}"
                                   placeholder="Enter new password"
                                   minlength="6"
                                   required>
                            <small class="text-muted">Minimum 6 characters required.</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password"
                                   class="form-control"
                                   th:field="*{confirmPassword}"
                                   placeholder="Confirm new password"
                                   minlength="6"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-dark action-btn w-100">
                            Change Password
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </main>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
